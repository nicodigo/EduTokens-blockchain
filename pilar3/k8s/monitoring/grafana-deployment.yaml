# Grafana Deployment — dashboard de observabilidad
# Single replica. Sin PVC (emptyDir para dashboards y plugins —
# los dashboards se cargan vía ConfigMap provisioning).
#
# Recursos: 128Mi-256Mi RAM, 100m-250m CPU (~3% del nodo e2-standard-2)
#
# Acceso público: https://grafana.edutokens.xyz (vía Ingress)
# Credenciales: admin / admin (cambiar en producción)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      securityContext:
        fsGroup: 472   # grafana
        runAsUser: 472
        runAsNonRoot: true
      containers:
        - name: grafana
          image: grafana/grafana:10.4.0
          imagePullPolicy: IfNotPresent
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
            - name: GF_SERVER_ROOT_URL
              value: https://grafana.edutokens.xyz
            - name: GF_SERVER_SERVE_FROM_SUB_PATH
              value: "false"
            # Disable sign-up and anonymous access
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
            # Reduce logging noise
            - name: GF_LOG_LEVEL
              value: warn
            # Disable update checks and telemetry
            - name: GF_ANALYTICS_CHECK_FOR_UPDATES
              value: "false"
            - name: GF_ANALYTICS_REPORTING_ENABLED
              value: "false"
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
              readOnly: true
            - name: dashboards-provider
              mountPath: /etc/grafana/provisioning/dashboards/provider.yaml
              subPath: provider.yaml
              readOnly: true
            - name: dashboards-json
              mountPath: /var/lib/grafana/dashboards
              readOnly: true
            - name: data
              mountPath: /var/lib/grafana
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboards-provider
          configMap:
            name: grafana-dashboards
            items:
              - key: provider.yaml
                path: provider.yaml
        - name: dashboards-json
          configMap:
            name: grafana-dashboards
            items:
              - key: edutokens.json
                path: edutokens.json
        - name: data
          emptyDir:
            sizeLimit: 512Mi

---
# Grafana Service — ClusterIP interno
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
spec:
  type: ClusterIP
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
