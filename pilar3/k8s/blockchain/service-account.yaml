# Kubernetes Service Account — Workload Identity para GKE → Artifact Registry
# Después de tofu apply, reemplazar <GSA_EMAIL> con el output "gke_pull_service_account".
#   tofu output gke_pull_service_account
#
apiVersion: v1
kind: ServiceAccount
metadata:
  name: blockchain
  namespace: blockchain
  annotations:
    # ⚠️ REEMPLAZAR con el email real después de tofu apply:
    iam.gke.io/gcp-service-account: "gke-pull-images@edutokens-2026.iam.gserviceaccount.com"
