# Ingress — HTTPS con certificado Let's Encrypt vía cert-manager
# Namespace: apps — único punto de entrada HTTPS desde internet
#
# Dominios:
#   edutokens.xyz  → /  → apps/frontend:80  (cuando se despliegue el frontend)
#
# NCT y RabbitMQ Management NO se exponen vía Ingress.
# Se acceden con kubectl port-forward:
#   kubectl -n blockchain port-forward svc/nct 8080:8080
#   kubectl -n infra port-forward svc/rabbitmq 15672:15672
#
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: edutokens-ingress
  namespace: apps
  labels:
    app: edutokens
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - edutokens.xyz
    - nct.edutokens.xyz
    secretName: edutokens-tls
  rules:
  - host: edutokens.xyz
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
  - host: nct.edutokens.xyz
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nct-api
            port:
              number: 8080
