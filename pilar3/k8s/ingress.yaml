# Ingress — HTTPS con wildcard TLS (certbot / Let's Encrypt)
# Namespace: apps — único punto de entrada HTTPS desde internet
#
# El Secret TLS (edutokens-tls) contiene el wildcard *.edutokens.xyz
# generado con certbot (DNS-01 challenge vía Namecheap).
# Cubre edutokens.xyz, nct.edutokens.xyz y cualquier subdominio futuro.
#
# Dominios:
#   edutokens.xyz        → /  → apps/frontend:80
#   nct.edutokens.xyz    → /  → apps/nct-api:8080
#   grafana.edutokens.xyz → /  → apps/grafana-api:3000
#
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: edutokens-ingress
  namespace: apps
  labels:
    app: edutokens
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - edutokens.xyz
    - nct.edutokens.xyz
    - grafana.edutokens.xyz
    secretName: edutokens-tls
  rules:
  - host: edutokens.xyz
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
  - host: nct.edutokens.xyz
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nct-api
            port:
              number: 8080
  - host: grafana.edutokens.xyz
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: grafana-api
            port:
              number: 3000
