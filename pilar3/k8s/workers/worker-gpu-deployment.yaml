# Worker GPU Deployment — para cluster del profesor con GPUs NVIDIA
# Requiere: nvidia-device-plugin instalado en el cluster
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-gpu
  namespace: g-compumundo
  labels:
    app: worker-gpu
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker-gpu
  template:
    metadata:
      labels:
        app: worker-gpu
    spec:
      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
      containers:
      - name: worker-gpu
        image: us-central1-docker.pkg.dev/edutokens-2026/edutokens-repo/worker-gpu:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: health
          containerPort: 8081
          protocol: TCP
        env:
        - name: POOL_ID
          value: "pool-a"
        - name: HEARTBEAT_INTERVAL
          value: "5"
        - name: HEALTH_PORT
          value: "8081"
        - name: MINER_BINARY
          value: "/app/md5_range"
        - name: LOG_FILE
          value: ""
        envFrom:
        - secretRef:
            name: worker-gpu-secret
        resources:
          requests:
            nvidia.com/gpu: 1
          limits:
            nvidia.com/gpu: 1
        livenessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 5
          timeoutSeconds: 3
