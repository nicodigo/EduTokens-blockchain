# Worker CPU Deployment — para cluster del profesor (sin GPU)
# Compañero del worker-gpu: mismos secretos, mismo pool, miner en CPU
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-cpu
  namespace: g-compumundo
  labels:
    app: worker-cpu
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker-cpu
  template:
    metadata:
      labels:
        app: worker-cpu
    spec:
      containers:
      - name: worker-cpu
        image: us-central1-docker.pkg.dev/edutokens-2026/edutokens-repo/worker-cpu:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: health
          containerPort: 8081
          protocol: TCP
        env:
        - name: POOL_ID
          value: "pool-a"
        - name: HEARTBEAT_INTERVAL
          value: "5"
        - name: HEALTH_PORT
          value: "8081"
        - name: MINER_BINARY
          value: "python /app/miner/cpu_miner.py"
        - name: LOG_FILE
          value: ""
        envFrom:
        - secretRef:
            name: worker-gpu-secret
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 5
          timeoutSeconds: 3