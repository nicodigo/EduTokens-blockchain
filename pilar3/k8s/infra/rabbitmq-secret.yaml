# RabbitMQ Credentials Secret
# Los valores reales deben inyectarse con kubectl create secret o ExternalSecret.
# Este archivo es el template con valores de ejemplo.
apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-credentials
  namespace: infra
  labels:
    app: rabbitmq
type: Opaque
stringData:
  # ⚠️  REEMPLAZAR con valores seguros antes de aplicar
  username: "admin"
  password: "CHANGE_ME_STRONG_PASSWORD"
