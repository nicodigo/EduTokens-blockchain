# RabbitMQ Certificate — TLS vía cert-manager + Let's Encrypt
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: rabbitmq-tls
  namespace: infra
  labels:
    app: rabbitmq
spec:
  secretName: rabbitmq-tls
  duration: 2160h       # 90 días
  renewBefore: 720h     # 30 días
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
  - rabbitmq.edutokens.duckdns.org
  privateKey:
    algorithm: RSA
    size: 2048
  usages:
  - server auth
