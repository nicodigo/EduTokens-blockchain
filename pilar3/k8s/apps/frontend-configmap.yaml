# Frontend ConfigMap — nginx.conf adaptado a Kubernetes DNS
# Montado como volumen en /etc/nginx/conf.d/default.conf
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: apps
  labels:
    app: frontend
data:
  default.conf: |
    server {
        listen 80;

        # Security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Serve static files
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }

        # Reverse-proxy API requests to the backend service
        location /api/ {
            proxy_pass http://backend.apps.svc.cluster.local:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 5M;
        }

        # Health check — estático (sin depender del backend)
        location /health {
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
