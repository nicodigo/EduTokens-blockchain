# Frontend Service — ClusterIP interno :80
# El Ingress (apps namespace) enruta edutokens.xyz → este servicio.
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: apps
  labels:
    app: frontend
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
  - name: http
    port: 80
    targetPort: 80
    protocol: TCP
