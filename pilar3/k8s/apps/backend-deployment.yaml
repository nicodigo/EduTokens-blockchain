# Backend Deployment — FastAPI + uvicorn :8000
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: apps
  labels:
    app: backend
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      terminationGracePeriodSeconds: 15
      containers:
      - name: backend
        image: us-central1-docker.pkg.dev/edutokens-2026/edutokens-repo/edutokens-backend:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        env:
        # ── Secretos primero (referenciados por $(VAR) en los siguientes) ──
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: backend-secret
              key: JWT_SECRET
        - name: ACADEMIC_AUTHORITY_PRIVATE_KEY
          valueFrom:
            secretKeyRef:
              name: backend-secret
              key: ACADEMIC_AUTHORITY_PRIVATE_KEY
        - name: ACADEMIC_AUTHORITY_PUBLIC_KEY
          valueFrom:
            secretKeyRef:
              name: backend-secret
              key: ACADEMIC_AUTHORITY_PUBLIC_KEY
        # ── Configuración (usa $(POSTGRES_PASSWORD) de arriba) ──
        - name: DATABASE_URL
          value: "postgresql+asyncpg://postgres:$(POSTGRES_PASSWORD)@postgres.apps.svc.cluster.local:5432/academic_points"
        - name: NCT_BASE_URL
          value: "http://nct.blockchain.svc.cluster.local:8080"
        - name: JWT_ALGORITHM
          value: "HS256"
        - name: JWT_EXPIRE_MINUTES
          value: "60"
        - name: AUTH_CHALLENGE_WINDOW_SECONDS
          value: "60"
        - name: DEBUG
          value: "False"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
