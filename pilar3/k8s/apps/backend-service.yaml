# Backend Service — ClusterIP interno
# El frontend (nginx) reverse-proxea /api/* a este servicio.
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: apps
  labels:
    app: backend
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
  - name: http
    port: 8000
    targetPort: 8000
    protocol: TCP
