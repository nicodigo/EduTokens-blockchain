# ClusterIssuer — Let's Encrypt Production
# Emite certificados TLS automáticamente vía HTTP-01 challenge.
# Requiere cert-manager y nginx-ingress instalados en el cluster.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    # ⚠️ REEMPLAZAR con tu email
    email: "<LETSENCRYPT_EMAIL>"
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
    - http01:
        ingress:
          class: nginx
