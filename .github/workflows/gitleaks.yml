# gitleaks.yml — Escaneo de secretos en cada push y PR
#
# Previene que claves privadas, tokens, o credenciales se commiteen
# accidentalmente. Detecta ~150 patrones por defecto (AWS, GCP, GitHub
# tokens, claves SSH, private keys, etc.).
#
# Usa el binario de gitleaks directamente (sin action externa) para
# evitar dependencia de licencias. Funciona en repos personales y
# organizaciones por igual.
#
# No requiere autenticación externa — es completamente standalone.

